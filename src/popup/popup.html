<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header style="display: flex; justify-content: space-between; align-items: center; position: relative;">
      <h1>tldr</h1>
      <button id="settings-btn" style="width: auto; padding: 4px; background: transparent; border: none; cursor: pointer; color: #525252;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>
    <main>
      <div id="api-hint" class="hidden" style="background: #FEF2F2; color: #991B1B; padding: 12px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 16px;">
        Please set your API key in settings to start.
      </div>
      <div id="idle-state">
        <h2 class="title">Capture the core of this page.</h2>
        <button id="summarize-btn">Summarize</button>
      </div>
      <div id="loading-state" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">Reading Content...</p>
      </div>
      <div id="error-state" class="hidden">
        <p id="error-msg"></p>
        <button id="retry-btn">Try again</button>
      </div>
      <div id="summary-state" class="hidden">
        <div class="summary-meta">
          <span id="word-count"></span>
          <div>
            <button id="copy-btn">Copy</button>
            <button id="close-btn">Close</button>
          </div>
        </div>
        <div class="scrollable-content">
          <section>
            <h2>Summary</h2>
            <ul id="summary-list"></ul>
          </section>
          <section>
            <h2>Insights</h2>
            <ul id="insights-list"></ul>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
